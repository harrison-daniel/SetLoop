name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node build.js
      - uses: actions/upload-artifact@v4
        with:
          name: setloop-extension
          path: dist/
          if-no-files-found: error
          retention-days: 30
