<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SetLoop Icon Generator</title>
<style>
  body { font-family: system-ui, sans-serif; background: #111; color: #eee; padding: 32px; }
  h2 { margin-bottom: 24px; font-weight: 600; }
  .row { display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; margin-bottom: 32px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-size: 12px; color: #888; }
  canvas { border-radius: 22%; box-shadow: 0 4px 20px rgba(245,158,66,0.3); }
  button {
    margin-top: 6px; padding: 5px 14px; background: rgba(245,158,66,0.15);
    border: 1px solid rgba(245,158,66,0.3); color: #F59E42;
    border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit;
  }
  button:hover { background: rgba(245,158,66,0.25); }
  .all-btn {
    padding: 10px 24px; background: linear-gradient(135deg,#F59E42,#EB6D3D);
    border: none; color: #fff; font-weight: 600; font-size: 14px;
    border-radius: 10px; cursor: pointer; font-family: inherit; margin-bottom: 32px;
  }
</style>
</head>
<body>
<h2>SetLoop — Icon Generator</h2>
<button class="all-btn" onclick="downloadAll()">Download all sizes</button>
<div class="row" id="row"></div>

<script>
const SIZES = [16, 32, 48, 128, 256, 512];

function drawIcon(size) {
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");
  const r = size * 0.22;  // corner radius

  // Rounded square background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, "#F59E42");
  grad.addColorStop(1, "#EB6D3D");

  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Subtle inner shadow at top
  const topGrad = ctx.createLinearGradient(0, 0, 0, size * 0.4);
  topGrad.addColorStop(0, "rgba(255,255,255,0.18)");
  topGrad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = topGrad;
  ctx.fill();

  // Loop/refresh arrow icon
  const pad = size * 0.24;
  const cx = size / 2, cy = size / 2;
  const arc = size * 0.28;
  const sw = Math.max(1.5, size * 0.075);

  ctx.strokeStyle = "rgba(255,255,255,0.95)";
  ctx.lineWidth = sw;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  // Draw the refresh arc (counter-clockwise, ~300 degrees)
  ctx.beginPath();
  ctx.arc(cx, cy + size * 0.02, arc, Math.PI * 0.2, Math.PI * 2.0, false);
  ctx.stroke();

  // Arrowhead at the top-right of the arc
  const arrowSize = sw * 2.2;
  const ax = cx + arc * Math.cos(Math.PI * 0.2);
  const ay = cy + size * 0.02 + arc * Math.sin(Math.PI * 0.2);
  ctx.beginPath();
  ctx.moveTo(ax - arrowSize * 0.9, ay - arrowSize * 0.5);
  ctx.lineTo(ax + arrowSize * 0.5, ay);
  ctx.lineTo(ax - arrowSize * 0.4, ay + arrowSize * 0.9);
  ctx.stroke();

  return canvas;
}

function download(canvas, filename) {
  canvas.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  });
}

function downloadAll() {
  SIZES.forEach(s => {
    setTimeout(() => download(drawIcon(s), `icon${s}.png`), s);
  });
}

const row = document.getElementById("row");
SIZES.forEach(s => {
  const canvas = drawIcon(s);
  const display = document.createElement("canvas");
  const ds = Math.max(s, 64);
  display.width = display.height = ds;
  const dctx = display.getContext("2d");
  dctx.imageSmoothingQuality = "high";
  dctx.drawImage(canvas, 0, 0, ds, ds);

  const item = document.createElement("div");
  item.className = "item";
  const btn = document.createElement("button");
  btn.textContent = "Save";
  btn.onclick = () => download(canvas, `icon${s}.png`);
  item.appendChild(display);
  item.innerHTML += `<span class="label">${s}×${s}</span>`;
  item.appendChild(btn);
  row.appendChild(item);
});
</script>
</body>
</html>
