<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SetLoop — Microphone Access</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0A0A0A; color: #E8E8E8;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    text-align: center; max-width: 380px; padding: 40px;
    background: #141414; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  h2 { font-size: 20px; margin: 0 0 8px; }
  h2 span { color: #F59E42; }
  p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; margin: 0 0 24px; }
  button {
    background: #F59E42; color: #000; border: none;
    padding: 12px 28px; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  .done { color: #4ADE80; font-weight: 600; font-size: 15px; }
  .err { color: #F87171; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<div class="card">
  <h2>Set<span>Loop</span> needs your mic</h2>
  <p>Voice commands are processed entirely on your device. No audio is recorded or sent anywhere. This is a one-time permission.</p>
  <button id="grant">Allow Microphone</button>
  <div id="status"></div>
</div>
<script src="mic-permission.js"></script>
</body>
</html>
